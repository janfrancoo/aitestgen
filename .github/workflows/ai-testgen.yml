name: AI Test Generator

on:
  push:
    branches:
      - main

jobs:
  generate-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: ./mvnw clean compile -DskipTests

      - name: Set up Python and install OpenAI SDK
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-pip
          pip install openai

      - name: Generate AI Tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Generating AI-based tests..."
          python3 <<'PYCODE'
          import os, subprocess, glob, re
          from openai import OpenAI
          
          
          def collect_dependencies(class_name, collected=None):
            if collected is None:
              collected = {}
        
            if class_name in collected:
              return collected
        
            found = glob.glob(f"**/*{class_name}.java", recursive=True)
            if not found:
              return collected
        
            file_path = found[0]
            with open(file_path, "r") as f:
              code = f.read()
        
            collected[class_name] = code
        
            imports = re.findall(r'import\s+com\.janfranco\.[\w.]+\.([A-Z]\w+);', code)
            for imp in imports:
              collect_dependencies(imp, collected)
        
            return collected
  
  
          client = OpenAI(api_key=os.getenv("OPENAI_API_KEY"))
  
          controllers = glob.glob("**/*Controller.java", recursive=True)

          for ctrl in controllers:
            controller_name = os.path.splitext(os.path.basename(ctrl))[0]
          
            with open(ctrl, 'r') as f:
              code = f.read()

            prompt = f"""
            You are a Java Spring Boot testing assistant.
            Write a JUnit 5 integration test class for the following controller.
            Use MockMvc, annotate with @SpringBootTest and @AutoConfigureMockMvc.
            Only generate valid compilable Java test code. Do not write any explanation and also do not write any comment in code.
            Your answer should start with Java code and end with it.
            Controller source:
            {code}
            Context that controller uses:
            """
          
            classes = re.findall(r'import\s+com\.janfranco\.[\w.]+\.([A-Z]\w+);', code)
            extended_classes = classes + [cls + 'Impl' for cls in classes if cls.endswith('Service')]
            collected = {}
          
            for cls in extended_classes:
              collect_dependencies(cls, collected)
          
            for cls_name, cls_content in collected.items():
              prompt += f"\n\n// ===== {cls_name}.java =====\n"
              prompt += cls_content

            response = client.chat.completions.create(model="gpt-4o-mini", messages=[{"role": "user", "content": prompt}])

            print(f"✅ Prompt for {ctrl}: {prompt}")
            test_code = response.choices[0].message.content.strip()
            print(f"✅ Generated test for {ctrl}: {test_code}")
      
            test_path = ctrl.replace(".java", f"{controller_name}Test.java").replace("src/main/java", "src/test/java")
    
            os.makedirs(os.path.dirname(test_path), exist_ok=True)
            with open(test_path, "w") as f:
              f.write(test_code)

          subprocess.run(["git", "config", "user.name", "AI Test Bot"])
          subprocess.run(["git", "config", "user.email", "bot@aitestgen.local"])
          subprocess.run(["git", "add", "src/test/java"])
          subprocess.run(["git", "commit", "-m", "🤖 Add AI-generated tests"])
          subprocess.run(["git", "push"])
          PYCODE
